<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Herita — Your Legacy, Protected</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { min-height: 100%; background: #08080f; color: #e2ddd6; font-family: 'Inter', system-ui, sans-serif; font-size: 14px; }
    textarea { resize: vertical; font-family: inherit; }
    button { font-family: inherit; cursor: pointer; transition: opacity 0.15s; }
    button:hover { opacity: 0.82; }
    input, select, textarea { outline: none; font-family: inherit; }
    input:focus, select:focus, textarea:focus { border-color: #c9b99a55 !important; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #222235; border-radius: 4px; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

    #app { min-height: 100vh; }
    nav { display:flex; align-items:center; justify-content:space-between; padding:18px 32px; border-bottom:1px solid #191926; background:#0b0b18; position:sticky; top:0; z-index:10; }
    .logo { font-family:Georgia,'Times New Roman',serif; font-size:22px; letter-spacing:0.1em; color:#c9b99a; font-weight:400; }
    .nav-right { display:flex; align-items:center; gap:16px; }
    .tabs { display:flex; border-bottom:1px solid #191926; background:#0b0b18; padding:0 32px; overflow-x:auto; }
    .tab { padding:13px 18px; font-size:11px; letter-spacing:0.12em; color:#444; border:none; border-bottom:2px solid transparent; background:none; white-space:nowrap; cursor:pointer; font-family:inherit; }
    .tab.active { color:#c9b99a; border-bottom:2px solid #c9b99a; }
    .content { max-width:860px; margin:0 auto; padding:32px 24px; }

    .card { background:#0f0f1e; border:1px solid #191926; border-radius:10px; padding:24px; margin-bottom:16px; }
    .card-title { font-size:10px; letter-spacing:0.16em; color:#444; margin-bottom:16px; text-transform:uppercase; }
    .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
    @media (max-width:600px) { .grid2{grid-template-columns:1fr;} nav{padding:14px 16px;} .content{padding:20px 16px;} .tabs{padding:0 16px;} }

    .field-label { font-size:10px; color:#444; letter-spacing:0.12em; display:block; margin-bottom:4px; }
    .field { width:100%; background:#08080f; border:1px solid #222235; border-radius:6px; padding:10px 14px; color:#e2ddd6; font-size:13px; margin-bottom:10px; font-family:inherit; }

    .btn { display:inline-block; padding:11px 22px; border-radius:6px; border:none; font-size:12px; letter-spacing:0.08em; font-weight:600; cursor:pointer; font-family:inherit; }
    .btn-primary { background:#c9b99a; color:#08080f; }
    .btn-outline { background:transparent; color:#888; border:1px solid #2a2a3e; }
    .btn-ghost { background:transparent; color:#666; border:none; padding:6px 10px; }
    .btn-danger { background:#7f1d1d; color:#fca5a5; }
    .btn-sm { padding:7px 14px; font-size:11px; }
    .btn-full { width:100%; display:block; text-align:center; }

    .row { display:flex; justify-content:space-between; align-items:center; padding:14px 0; border-bottom:1px solid #131325; }
    .row:last-child { border-bottom:none; }
    .row-actions { display:flex; gap:8px; align-items:center; flex-shrink:0; margin-left:12px; }

    .tag { display:inline-block; padding:2px 10px; border-radius:20px; font-size:10px; letter-spacing:0.1em; }
    .status-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; display:inline-block; vertical-align:middle; margin-right:6px; }
    .big-n { font-family:Georgia,serif; font-size:44px; line-height:1; margin-bottom:6px; }
    .divider { border-top:1px solid #131325; margin:16px 0; }
    .empty { text-align:center; padding:48px 0; color:#2a2a3e; font-size:13px; line-height:1.8; }

    .modal-overlay { position:fixed; inset:0; background:#000000cc; display:flex; align-items:center; justify-content:center; z-index:50; padding:16px; }
    .modal-box { background:#0f0f1e; border:1px solid #222235; border-radius:12px; padding:28px; width:100%; max-width:460px; max-height:90vh; overflow-y:auto; }
    .modal-title { font-family:Georgia,serif; font-size:20px; color:#c9b99a; margin-bottom:20px; }
    .modal-actions { display:flex; gap:10px; justify-content:flex-end; margin-top:8px; }

    #toast { position:fixed; bottom:28px; right:28px; padding:12px 20px; border-radius:8px; font-size:13px; z-index:200; max-width:320px; display:none; line-height:1.5; }

    .auth-wrap { display:flex; align-items:center; justify-content:center; min-height:100vh; }
    .auth-inner { width:100%; max-width:400px; padding:24px; }
    .auth-logo { font-family:Georgia,serif; font-size:32px; color:#c9b99a; letter-spacing:0.12em; text-align:center; margin-bottom:8px; }
    .auth-sub { color:#444; font-size:13px; letter-spacing:0.06em; text-align:center; margin-bottom:40px; }
    .mode-btns { display:flex; gap:8px; margin-bottom:20px; }
    .mode-btns button { flex:1; }

    .paywall-wrap { max-width:680px; margin:48px auto; padding:0 24px; }
    .plan-card { background:#08080f; border:1px solid #191926; border-radius:10px; padding:24px; cursor:pointer; transition:border-color 0.2s; }
    .plan-card.selected { background:#0f0f1e; border-color:#c9b99a; }

    .trigger-alert { background:#1a0808; border:1px solid #7f1d1d; border-radius:8px; padding:18px 24px; margin-bottom:20px; display:flex; justify-content:space-between; align-items:center; gap:16px; flex-wrap:wrap; }
    .how-row { display:flex; gap:16px; margin-bottom:14px; }
    .how-step { min-width:110px; font-size:11px; color:#c9b99a; letter-spacing:0.06em; padding-top:1px; flex-shrink:0; }
    .how-desc { color:#666; font-size:13px; line-height:1.5; }
    .overview-row { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:12px; }
    .plan-badge { display:inline-block; padding:2px 10px; border-radius:20px; font-size:9px; letter-spacing:0.1em; background:#c9b99a22; color:#c9b99a; border:1px solid #c9b99a44; }
    .limit-notice { background:#0a0a18; border:1px solid #c9b99a33; border-radius:10px; padding:14px 20px; font-size:12px; color:#666; margin-bottom:16px; }
    .loader { display:flex; align-items:center; justify-content:center; min-height:100vh; font-family:Georgia,serif; color:#c9b99a; font-size:24px; letter-spacing:0.1em; }
    .error-banner { background:#1a0808; border:1px solid #7f1d1d; border-radius:8px; padding:16px 20px; margin:24px; font-size:13px; color:#fca5a5; line-height:1.6; }
  </style>
</head>
<body>
<div id="app"><div class="loader">HERITA</div></div>
<div id="toast"></div>

<script>
// ─── CONFIG — replace before deploying ───────────────────
var SUPABASE_URL      = 'https://rmdsvckuumegqwflncml.supabase.co';
var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJtZHN2Y2t1dW1lZ3F3ZmxuY21sIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI3NjA1NzksImV4cCI6MjA5ODMzNjU3OX0.gUN7ffBe-yP765a22076SAzw8F6FQwD6-OjuHe4C5j8';
var PAYSTACK_KEY      = 'pk_live_96c120dca7c0729fceba177b67720a67030356a3';
// ─────────────────────────────────────────────────────────

var PLANS = {
  basic:   { name:'Guardian', price:50000,  label:'₦50,000/yr',  days:30,
             features:['Asset vault','3 beneficiaries','Final messages','30-day check-in'] },
  premium: { name:'Legacy',   price:100000, label:'₦100,000/yr', days:14,
             features:['Everything in Guardian','Unlimited beneficiaries','Document upload','Crypto instructions','14-day check-in','Lawyer contact storage'] }
};

var _sb = null; // supabase client, set after scripts load
var _paystackReady = false;

var state = {
  user:null, profile:null, loading:true, initError:null, needsSetup:false,
  tab:'dashboard', modal:null,
  assets:[], beneficiaries:[], messages:[], documents:[],
  selectedPlan:'basic', authMode:'login', uploading:false,
  authEmail:'', authPassword:'',
  assetName:'', assetType:'property', assetValue:'', assetBen:'', assetNotes:'',
  benName:'', benEmail:'', benPhone:'', benRel:'',
  msgBen:'', msgContent:'',
  docName:'', docBen:'', docFile:null
};

var toastTimer = null;

// ─── UTILS ───────────────────────────────────────────────
function fmt(n) { try { return new Intl.NumberFormat('en-NG').format(n); } catch(e){ return n; } }
function fmtDate(d) { try { return new Date(d).toLocaleDateString('en-NG',{day:'numeric',month:'short',year:'numeric'}); } catch(e){ return d; } }
function daysUntil(d) { return Math.ceil((new Date(d) - new Date()) / 86400000); }
function esc(s) {
  return String(s==null?'':s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;');
}
function getBenName(id) {
  var b = state.beneficiaries.find(function(b){ return b.id===id; });
  return b ? b.name : '—';
}
function showToast(msg, type) {
  type = type||'success';
  var el = document.getElementById('toast');
  if (!el) return;
  var c = {success:['#14532d','#86efac','#166534'],error:['#7f1d1d','#fca5a5','#991b1b'],warn:['#78350f','#fcd34d','#92400e']}[type]||['#14532d','#86efac','#166534'];
  el.style.cssText='position:fixed;bottom:28px;right:28px;padding:12px 20px;border-radius:8px;font-size:13px;z-index:200;max-width:320px;display:block;line-height:1.5;background:'+c[0]+';color:'+c[1]+';border:1px solid '+c[2]+';';
  el.textContent = msg;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function(){ el.style.display='none'; }, 4000);
}
function statusInfo() {
  var p = state.profile;
  if (!p) return {color:'#22c55e',label:'ACTIVE',daysLeft:null};
  var dl = p.checkin_due ? daysUntil(p.checkin_due) : null;
  if (p.triggered)              return {color:'#ef4444',label:'TRIGGERED',daysLeft:dl};
  if (dl!==null && dl<=0)       return {color:'#ef4444',label:'OVERDUE',daysLeft:dl};
  if (dl!==null && dl<=7)       return {color:'#f59e0b',label:'CHECK-IN DUE',daysLeft:dl};
  return {color:'#22c55e',label:'ACTIVE',daysLeft:dl};
}
var ATC = {property:'#c9b99a',bank:'#22c55e',crypto:'#8b5cf6',insurance:'#38bdf8',other:'#64748b'};
function tag(text, color) {
  return '<span class="tag" style="background:'+color+'22;color:'+color+';border:1px solid '+color+'44;">'+esc(text)+'</span>';
}
function benOpts(all) {
  var o = all ? '<option value="">All beneficiaries</option>' : '<option value="">Select beneficiary</option>';
  state.beneficiaries.forEach(function(b){ o+='<option value="'+esc(b.id)+'">'+esc(b.name)+'</option>'; });
  return o;
}

// ─── SUPABASE HELPERS ────────────────────────────────────
function sb() {
  if (!_sb) { showToast('Supabase not loaded. Check your internet connection.','error'); throw new Error('No supabase'); }
  return _sb;
}

// ─── DATA ────────────────────────────────────────────────
async function loadProfile() {
  var r = await sb().from('profiles').select('*').eq('id',state.user.id).single();
  state.profile = r.data || null;
}
async function loadAll() {
  if (!state.user) return;
  var uid = state.user.id;
  var res = await Promise.all([
    sb().from('assets').select('*').eq('user_id',uid).order('created_at',{ascending:false}),
    sb().from('beneficiaries').select('*').eq('user_id',uid).order('created_at'),
    sb().from('messages').select('*').eq('user_id',uid),
    sb().from('documents').select('*').eq('user_id',uid).order('created_at',{ascending:false})
  ]);
  state.assets        = (res[0].data)||[];
  state.beneficiaries = (res[1].data)||[];
  state.messages      = (res[2].data)||[];
  state.documents     = (res[3].data)||[];
}

// ─── AUTH ────────────────────────────────────────────────
async function handleAuth() {
  if (!state.authEmail||!state.authPassword) return showToast('Email and password required.','error');
  state.loading=true; render();
  try {
    var res = state.authMode==='login'
      ? await sb().auth.signInWithPassword({email:state.authEmail,password:state.authPassword})
      : await sb().auth.signUp({email:state.authEmail,password:state.authPassword});
    if (res.error) { showToast(res.error.message,'error'); }
    else if (state.authMode==='signup') showToast('Account created. Check your email to confirm.');
  } catch(e) { showToast('Auth error: '+e.message,'error'); }
  state.loading=false; render();
}
async function handleLogout() {
  try { await sb().auth.signOut(); } catch(e){}
  state.user=null; state.profile=null;
  state.assets=[]; state.beneficiaries=[]; state.messages=[]; state.documents=[];
  render();
}

// ─── PAYSTACK ────────────────────────────────────────────
function initPaystack() {
  if (!window.PaystackPop) return showToast('Paystack is loading. Try again in a moment.','warn');
  var plan = PLANS[state.selectedPlan];
  try {
    var handler = window.PaystackPop.setup({
      key:PAYSTACK_KEY, email:state.user.email,
      amount:plan.price*100, currency:'NGN',
      ref:'herita_'+state.user.id+'_'+Date.now(),
      onSuccess: async function(tx) {
        try {
          await sb().from('profiles').upsert({
            id:state.user.id, email:state.user.email,
            plan:state.selectedPlan,
            plan_expires:new Date(Date.now()+365*86400000).toISOString(),
            checkin_due:new Date(Date.now()+plan.days*86400000).toISOString(),
            triggered:false, paystack_ref:tx.reference
          });
          await loadProfile();
          showToast(plan.name+' plan activated.');
          render();
        } catch(e){ showToast('Plan activation error: '+e.message,'error'); }
      },
      onCancel:function(){ showToast('Payment cancelled.','warn'); }
    });
    handler.openIframe();
  } catch(e){ showToast('Paystack error: '+e.message,'error'); }
}

// ─── CHECK-IN ────────────────────────────────────────────
async function handleCheckin() {
  try {
    var days = state.profile && state.profile.plan==='premium' ? 14 : 30;
    var nextDue = new Date(Date.now()+days*86400000).toISOString();
    await sb().from('profiles').update({checkin_due:nextDue,triggered:false}).eq('id',state.user.id);
    await loadProfile();
    showToast('Check-in confirmed. Next check-in in '+days+' days.');
    render();
  } catch(e){ showToast('Error: '+e.message,'error'); }
}
async function simulateTrigger() {
  try {
    await sb().from('profiles').update({triggered:true}).eq('id',state.user.id);
    await loadProfile(); showToast('Trigger activated — beneficiaries would be notified.','warn'); render();
  } catch(e){ showToast('Error: '+e.message,'error'); }
}

// ─── ASSETS ──────────────────────────────────────────────
async function saveAsset() {
  if (!state.assetName||!state.assetBen) return showToast('Name and beneficiary required.','error');
  try {
    var r = await sb().from('assets').insert({
      name:state.assetName, type:state.assetType, value:state.assetValue||null,
      beneficiary_id:state.assetBen, notes:state.assetNotes, user_id:state.user.id
    });
    if (r.error) return showToast(r.error.message,'error');
    state.assetName=''; state.assetType='property'; state.assetValue=''; state.assetBen=''; state.assetNotes='';
    state.modal=null; await loadAll(); showToast('Asset saved.'); render();
  } catch(e){ showToast('Error: '+e.message,'error'); }
}
async function deleteAsset(id) {
  try {
    await sb().from('assets').delete().eq('id',id);
    state.assets=state.assets.filter(function(a){return a.id!==id;});
    showToast('Asset removed.'); render();
  } catch(e){ showToast('Error: '+e.message,'error'); }
}

// ─── BENEFICIARIES ───────────────────────────────────────
async function saveBeneficiary() {
  if (!state.benName||!state.benEmail) return showToast('Name and email required.','error');
  if (state.profile && state.profile.plan!=='premium' && state.beneficiaries.length>=3)
    return showToast('Guardian plan allows 3 beneficiaries. Upgrade to Legacy for more.','warn');
  try {
    var r = await sb().from('beneficiaries').insert({
      name:state.benName, email:state.benEmail, phone:state.benPhone,
      relationship:state.benRel, user_id:state.user.id
    });
    if (r.error) return showToast(r.error.message,'error');
    state.benName=''; state.benEmail=''; state.benPhone=''; state.benRel='';
    state.modal=null; await loadAll(); showToast('Beneficiary added.'); render();
  } catch(e){ showToast('Error: '+e.message,'error'); }
}
async function deleteBeneficiary(id) {
  try {
    await sb().from('beneficiaries').delete().eq('id',id);
    state.beneficiaries=state.beneficiaries.filter(function(b){return b.id!==id;});
    showToast('Beneficiary removed.'); render();
  } catch(e){ showToast('Error: '+e.message,'error'); }
}

// ─── MESSAGES ────────────────────────────────────────────
async function saveMessage() {
  if (!state.msgBen||!state.msgContent) return showToast('Select a beneficiary and write a message.','error');
  try {
    var existing = state.messages.find(function(m){return m.beneficiary_id===state.msgBen;});
    if (existing) await sb().from('messages').update({content:state.msgContent}).eq('id',existing.id);
    else await sb().from('messages').insert({beneficiary_id:state.msgBen,content:state.msgContent,user_id:state.user.id});
    state.msgBen=''; state.msgContent='';
    state.modal=null; await loadAll(); showToast('Message saved.'); render();
  } catch(e){ showToast('Error: '+e.message,'error'); }
}

// ─── DOCUMENTS ───────────────────────────────────────────
async function uploadDocument() {
  if (!state.docFile||!state.docName) return showToast('Select a file and give it a name.','error');
  if (!state.profile||state.profile.plan!=='premium') return showToast('Document upload is a Legacy plan feature.','warn');
  state.uploading=true; render();
  try {
    var ext=state.docFile.name.split('.').pop();
    var path=state.user.id+'/'+Date.now()+'.'+ext;
    var up=await sb().storage.from('documents').upload(path,state.docFile);
    if (up.error){state.uploading=false;showToast(up.error.message,'error');render();return;}
    await sb().from('documents').insert({
      user_id:state.user.id, name:state.docName,
      beneficiary_id:state.docBen||null, storage_path:path, file_type:ext
    });
    state.docFile=null; state.docName=''; state.docBen='';
    state.modal=null; state.uploading=false;
    await loadAll(); showToast('Document uploaded.'); render();
  } catch(e){ state.uploading=false; showToast('Error: '+e.message,'error'); render(); }
}
async function getDocumentUrl(p) {
  try {
    var r=await sb().storage.from('documents').createSignedUrl(p,60);
    if (r.data&&r.data.signedUrl) window.open(r.data.signedUrl,'_blank');
    else showToast('Could not retrieve file.','error');
  } catch(e){ showToast('Error: '+e.message,'error'); }
}
async function deleteDocument(id,p) {
  try {
    await sb().storage.from('documents').remove([p]);
    await sb().from('documents').delete().eq('id',id);
    state.documents=state.documents.filter(function(d){return d.id!==id;});
    showToast('Document deleted.'); render();
  } catch(e){ showToast('Error: '+e.message,'error'); }
}

// ─── RENDER ──────────────────────────────────────────────
function render() {
  var app=document.getElementById('app');
  if (!app) return;

  if (state.loading) { app.innerHTML='<div class="loader">HERITA</div>'; return; }
  if (state.needsSetup) { app.innerHTML=renderSetup(); return; }

  if (state.initError) {
    app.innerHTML='<div class="loader" style="flex-direction:column;gap:16px;">'+
      '<div style="font-family:Georgia,serif;color:#c9b99a;font-size:24px;letter-spacing:0.1em;">HERITA</div>'+
      '<div class="error-banner" style="max-width:400px;">'+
        'Could not load required scripts. Please check your internet connection and reload the page.<br><br>'+
        '<span style="color:#666;font-size:12px;">'+esc(state.initError)+'</span>'+
      '</div>'+
      '<button class="btn btn-primary" onclick="location.reload()">RELOAD</button>'+
    '</div>';
    return;
  }

  if (!state.user) { app.innerHTML=renderAuth(); return; }

  var isPaid = state.profile && state.profile.plan && state.profile.plan_expires && new Date(state.profile.plan_expires)>new Date();
  if (!isPaid) { app.innerHTML=renderPaywall(); return; }

  var si=statusInfo();
  var isPremium=state.profile && state.profile.plan==='premium';
  var TABS=['dashboard','vault','beneficiaries','messages'];
  if (isPremium) TABS.push('documents');

  var tabHTML='';
  if (state.tab==='dashboard')       tabHTML=renderDashboard(si,isPremium);
  else if (state.tab==='vault')      tabHTML=renderVault();
  else if (state.tab==='beneficiaries') tabHTML=renderBeneficiaries(isPremium);
  else if (state.tab==='messages')   tabHTML=renderMessages();
  else if (state.tab==='documents')  tabHTML=renderDocuments();

  var modalHTML='';
  if (state.modal==='asset')         modalHTML=mAsset();
  else if (state.modal==='beneficiary') modalHTML=mBen();
  else if (state.modal==='message')  modalHTML=mMsg();
  else if (state.modal==='document') modalHTML=mDoc();

  var pulsing=state.profile&&(state.profile.triggered||si.label==='OVERDUE');
  var planName=state.profile&&PLANS[state.profile.plan]?PLANS[state.profile.plan].name.toUpperCase():'';

  app.innerHTML=
    '<nav>'+
      '<div class="logo">HERITA</div>'+
      '<div class="nav-right">'+
        '<span style="color:'+si.color+';font-size:11px;letter-spacing:0.12em;font-weight:600;display:flex;align-items:center;">'+
          '<span class="status-dot" style="background:'+si.color+';animation:'+(pulsing?'pulse 1.5s infinite':'none')+'"></span>'+
          si.label+
        '</span>'+
        '<span class="plan-badge">'+esc(planName)+'</span>'+
        '<button class="btn btn-ghost" onclick="handleLogout()">Sign out</button>'+
      '</div>'+
    '</nav>'+
    '<div class="tabs">'+
      TABS.map(function(t){return '<button class="tab'+(state.tab===t?' active':'')+'" onclick="switchTab(\''+t+'\')">'+t.toUpperCase()+'</button>';}).join('')+
    '</div>'+
    '<div class="content">'+tabHTML+'</div>'+
    modalHTML;
}

// ─── SCREENS ─────────────────────────────────────────────
function renderAuth() {
  var m=state.authMode;
  return '<div class="auth-wrap"><div class="auth-inner">'+
    '<div class="auth-logo">HERITA</div>'+
    '<div class="auth-sub">Your legacy, protected.</div>'+
    '<div class="card">'+

// ─── BOOT — load scripts dynamically then init ────────────
function loadScript(src, cb, onErr) {
  var s=document.createElement('script');
  s.src=src;
  s.onload=cb;
  s.onerror=onErr;
  document.head.appendChild(s);
}

function isConfigured() {
  return SUPABASE_URL.indexOf('YOUR_') === -1 && SUPABASE_URL.indexOf('http') === 0;
}

      '<p style="color:#666;font-size:13px;line-height:1.7;margin-bottom:20px;">'+
        'Open <strong style="color:#888;">herita.html</strong> in a text editor and replace the three config values at the top of the script with your real credentials.'+
      '</p>'+
      '<div style="background:#08080f;border:1px solid #222235;border-radius:6px;padding:14px 16px;font-size:12px;color:#555;line-height:2;font-family:monospace;">'+
        'SUPABASE_URL &nbsp;&nbsp;&nbsp;= \'https://xxxx.supabase.co\'<br>'+

        'PAYSTACK_KEY &nbsp;&nbsp;= \'pk_live_...\''+

      '</p>'+
    '</div>'+
  '</div></div>';

function initSupabase() {
  try {
    if (!window.supabase) throw new Error('Supabase library not available');

    // Show setup screen if credentials are still placeholders
    if (!isConfigured()) {
      state.loading = false;
      state.needsSetup = true;
      render();
      return;
    }

    _sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    _sb.auth.getSession().then(function(r) {
      state.user = r.data&&r.data.session ? r.data.session.user : null;
      state.loading=false;
      if (state.user) {
        Promise.all([loadProfile(),loadAll()]).then(render).catch(function(e){
          showToast('Failed to load data: '+e.message,'error');
          render();
        });
      } else {
        render();
      }
    }).catch(function(e){
      state.loading=false;
      state.initError='Session check failed: '+e.message;
      render();
    });

    _sb.auth.onAuthStateChange(function(_e,session){
      state.user=session?session.user:null;
      if (state.user) {
        Promise.all([loadProfile(),loadAll()]).then(render).catch(function(e){showToast('Load error: '+e.message,'error');render();});
      } else {
        state.profile=null; state.assets=[]; state.beneficiaries=[]; state.messages=[]; state.documents=[];
        render();
      }
    });
  } catch(e) {
    state.loading=false;
    state.initError=e.message;
    render();
  }
}
